<section id="galerie" class="page-section garden-gradient-subtle">
  <div class="container-shell">
    <app-section-title title="Eindrücke aus unserem Verein" />

    <div class="gallery-grid">
      @for (image of images; track image.src) {
        <figure class="gallery-item surface-card">
          <img [src]="image.src" [alt]="image.alt" loading="lazy" />
        </figure>
      }
    </div>
  </div>
</section>
