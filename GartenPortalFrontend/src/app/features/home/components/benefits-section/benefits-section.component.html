<section id="warum" class="page-section garden-gradient-subtle">
  <div class="container-shell">
    <app-section-title title="Warum unser Verein?" />

    <div class="benefits-grid">
      @for (benefit of benefits; track benefit.title) {
        <article class="benefit-card surface-card">
          <div class="benefit-icon">{{ benefit.icon }}</div>
          <h3>{{ benefit.title }}</h3>
          <p>{{ benefit.text }}</p>
        </article>
      }
    </div>
  </div>
</section>
